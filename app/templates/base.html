<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{% block title %}Barber Booking{% endblock %}</title>
</head>
<body>
	<h1>Welcome to the Barber Booking App</h1>
<!-- the block content will come into these blocks from other pages like login, register, dashboard etc. -->
	{% block content %}
	{% endblock %} 


<!-- this for the flash messages -->
	{% with messages = get_flashed_messages(with_categories=true) %}

    {% if messages %}

        {% for category, message in messages %}

            <p>{{ message }}</p>

        {% endfor %}

    {% endif %}

  {% endwith %}
</body>
</html>
