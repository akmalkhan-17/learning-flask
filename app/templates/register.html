<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>REGISTER</title>
</head>
<body>
	<h1>Register your account</h1>
	<form method="POST">

		<button type="submit">Register</button>
	</form>
</body>
</html>
